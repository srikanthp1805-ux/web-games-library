name: Pharma Validation Job Search Agent

on:
  schedule:
    - cron: '0 12 * * *'   # 8:00 AM EDT (UTC-4)
    - cron: '0 18 * * *'   # 2:00 PM EDT (UTC-4)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  search-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r job_search_agent/requirements.txt

      - name: Run job search agent
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python job_search_agent/job_search.py
